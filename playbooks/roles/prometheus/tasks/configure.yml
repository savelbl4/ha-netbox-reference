- name: Создать пользователя prometheus
  ansible.builtin.user:
    name: prometheus
    system: true
    shell: "/usr/sbin/nologin"
    home: "{{ prometheus_work_path }}"
    create_home: true

- name: Создать каталог для данных
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    recurse: true
  loop:
    - "{{ prometheus_data_path }}"

- name: Скопировать шаблон конфига
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_work_path }}/prometheus.yml"
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: Перезапустить Alloy

- name: Убедиться, что prometheus бинарь доступен
  ansible.builtin.file:
    path: "{{ prometheus_binary_path }}"
    mode: '0755'
    state: file

- name: Установить systemd unit для prometheus
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: "/etc/systemd/system/prometheus.service"
    mode: '0644'
  notify: Перезапустить Prometheus

- name: Включить и запустить Prometheus
  ansible.builtin.systemd:
    name: prometheus
    enabled: true
    state: started
    daemon_reload: true
